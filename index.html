<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Second Month</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 90vw;
            max-width: 500px;
            aspect-ratio: 1 / 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            cursor: zoom-in;
        }
        /* The actual image */
        .image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }
        /* The text layer - hidden by default */
        .text-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            display: grid;
            grid-template-columns: repeat(30, 1fr);
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 5px;
        }
        .text-piece {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3px;
            font-family: Arial, sans-serif;
            color: #222;
            font-weight: bold;
        }
        /* When you hover OR zoom in, show the text */
        .container:hover .image {
            opacity: 0;
        }
        .container:hover .text-overlay {
            opacity: 1;
        }
        /* This makes text bigger when browser zooms */
        @media (min-zoom: 120%), 
               (min-resolution: 120dpi) {
            .text-piece {
                font-size: 8px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <img src="20260213225203_IMG_2301_edit_3847230263994.jpg"  class="image" alt="Photo">
    
    <div class="text-overlay" id="textGrid"></div>
</div>
<script>
    const grid = document.getElementById('textGrid');
    const message = "happy second month ";
    
    // Create many small boxes
    for (let i = 0; i < 900; i++) { 
        const cell = document.createElement('div');
        cell.classList.add('text-piece');
        cell.innerText = message;
        grid.appendChild(cell);
    }
</script>
</body>
</html>
